<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEM PAGAR</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- GIF Splash Overlay -->
    <div id="gif-splash" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;">
        <img src="120312.gif" alt="" style="max-width:80%;max-height:80%;border-radius:12px;box-shadow:0 0 40px #00ff41;">
    </div>





    <!-- Wrapper Principal para Layout Horizontal -->
    <div class="main-content">

    <!-- Header -->
    <div class="header">
        <div class="brand">
            <img src="icons/icon.png" alt="" class="brand-logo" aria-hidden="true">
            <div class="brand-info">
                <div class="brand-text">SEM PAGAR</div>
            </div>
        </div>
        <div class="header-actions">
            <div class="status-badge" id="status-badge">
                <span class="status-dot"></span>
                LIBERADO PAPAI!
            </div>
        </div>
    </div>

    <!-- Overlay quando não está no Lovable -->
    <div id="lovable-required-overlay" class="lovable-required-overlay" style="display: none;">
        <p class="lovable-required-text">Abra o Lovable.dev para usar a extensão.</p>
        <p class="lovable-required-hint">A extensão só funciona em abas de projeto do Lovable.</p>
    </div>

    <!-- Área de Chat -->
    <div class="chat-container" id="chat-container"></div>

    <!-- Marca d'água (Logo) -->
    <img src="icons/logo.png" alt="Logo Central" class="chat-bg-logo" id="chat-bg-logo">


    <!-- Área de Input -->
    <div class="input-container">
        <div class="advanced-input-wrapper">
            <!-- Preview de arquivos anexados -->
            <div id="file-preview-container" class="file-preview-container" style="display: none;"></div>

            <!-- Campo de texto -->
            <div class="input-main-area">
                <textarea id="message-input" placeholder="Enviar mensagem..." autocomplete="off" rows="1"></textarea>
            </div>

            <!-- Botões de ação -->
            <div class="input-actions-row">
                <div class="right-actions">
                    <button id="send-btn" class="send-btn" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 10 4 15 9 20"></polyline>
                            <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    </div> <!-- Fim main-content -->

    <!-- Barra Lateral Direita -->
    <div class="sidebar">
        <!-- Criar Novo Projeto -->
        <button class="action-btn sidebar-btn" id="new-project-btn" title="Criar novo projeto">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12h14"/>
            </svg>
        </button>

        <!-- Limpar Conversa -->
        <button class="action-btn sidebar-btn" id="clear-history-btn" title="Limpar conversa">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        </button>

        <div class="sidebar-divider"></div>

        <!-- Melhorar Prompt com IA -->
        <button class="action-btn sidebar-btn" id="improve-prompt-btn" title="Melhorar prompt com IA">
            <span class="improve-prompt-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                </svg>
            </span>
            <span class="improve-prompt-spinner" aria-hidden="true">
                <svg class="spinner-svg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
                </svg>
            </span>
        </button>
        <!-- Digitação por Voz -->
        <button class="action-btn sidebar-btn" id="voice-btn" title="Digitação por voz">
            <span class="voice-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="22"/>
                </svg>
            </span>
            <span class="voice-recording-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="6" width="12" height="12" rx="2"/>
                </svg>
            </span>
            <span class="voice-processing-icon" aria-hidden="true">
                <svg class="spinner-svg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
                </svg>
            </span>
        </button>
        <!-- Anexar Arquivo -->
        <button class="action-btn sidebar-btn" id="attach-btn" title="Anexar arquivo">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.51a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
        </button>
        <!-- Screenshot do Preview -->
        <button class="action-btn sidebar-btn" id="screenshot-btn" title="Capturar preview">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </button>
        <!-- Download ZIP -->
        <button class="action-btn sidebar-btn" id="download-project-btn" title="Baixar código-fonte (ZIP)">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        </button>
        <!-- Remover Marca d'Água -->
        <button class="action-btn sidebar-btn" id="remove-watermark-btn" title="Remover marca d'água">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <line x1="2" y1="2" x2="22" y2="22"/>
            </svg>
        </button>

    </div>

    <!-- Modal de Confirmação Customizado -->
    <div id="confirm-modal" class="confirm-modal" style="display:none;">
        <div class="confirm-modal-box">
            <div class="confirm-modal-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="13" x2="12" y2="17"/>
                    <line x1="12" y1="10" x2="12.01" y2="10"/>
                </svg>
            </div>
            <p class="confirm-modal-title">Novo Projeto</p>
            <p class="confirm-modal-text">Deseja criar um novo projeto no Lovable?</p>
            <div class="confirm-modal-actions">
                <button id="confirm-modal-cancel" class="confirm-modal-btn cancel">Cancelar</button>
                <button id="confirm-modal-ok" class="confirm-modal-btn ok">Criar projeto</button>
            </div>
        </div>
    </div>

    <!-- Overlay de Download -->
    <div id="download-overlay" class="download-overlay" style="display: none;">
        <div class="download-overlay-content">
            <div class="download-spinner"></div>
            <span class="download-overlay-text">Preparando download...</span>
        </div>
    </div>

    <script src="c1.js"></script>
    <script src="c3.js"></script>
    <script src="c2.js"></script>
</body>
</html>
